- apiVersion: v1
  data:
    config.yml: |-
      # ============================================================================
      # Configarr — configuration as code
      # ----------------------------------------------------------------------------
      # Source de vérité unique pour la synchronisation TRaSH-Guides / custom
      # formats sur Sonarr et Radarr (namespace selfhost).
      #
      # Stratégie : profil HD only (720p + 1080p), priorité aux fichiers les plus
      # petits via mHD + x265. Pas de HDR, pas de 4K (à activer plus tard).
      #
      # Doc : https://configarr.de/docs/intro/
      # ============================================================================

      trashGuideUrl: https://github.com/TRaSH-Guides/Guides
      recyclarrConfigUrl: https://github.com/recyclarr/config-templates

      # ============================================================================
      # Custom format definitions
      # ============================================================================
      customFormatDefinitions:
        # ---------------------------------------------------------------------------
        # Pistes françaises (préférées) — score positif.
        # ---------------------------------------------------------------------------
        - trash_id: fr-vff
          trash_scores:
            default: 150
          name: "FR: VFF / TRUEFRENCH"
          includeCustomFormatWhenRenaming: false
          specifications:
            - name: VFF or TRUEFRENCH in release title
              implementation: ReleaseTitleSpecification
              negate: false
              required: false
              fields:
                value: "\\b(VFF|TRUEFRENCH)\\b"

        - trash_id: fr-vfi
          trash_scores:
            default: 150
          name: "FR: VFI"
          includeCustomFormatWhenRenaming: false
          specifications:
            - name: VFI in release title
              implementation: ReleaseTitleSpecification
              negate: false
              required: false
              fields:
                value: "\\bVFI\\b"

        - trash_id: fr-vfq
          trash_scores:
            default: 150
          name: "FR: VFQ"
          includeCustomFormatWhenRenaming: false
          specifications:
            - name: VFQ in release title
              implementation: ReleaseTitleSpecification
              negate: false
              required: false
              fields:
                value: "\\bVFQ\\b"

        - trash_id: fr-multi
          trash_scores:
            default: 100
          name: "FR: MULTi"
          includeCustomFormatWhenRenaming: false
          specifications:
            - name: MULTi in release title
              implementation: ReleaseTitleSpecification
              negate: false
              required: false
              fields:
                value: "\\bMULTI?\\b"

        # ---------------------------------------------------------------------------
        # Sous-titres uniquement (à interdire) — score rédhibitoire.
        # ---------------------------------------------------------------------------
        - trash_id: fr-vostfr
          trash_scores:
            default: -10000
          name: "FR: VOSTFR (subs only)"
          includeCustomFormatWhenRenaming: false
          specifications:
            - name: VOSTFR in release title
              implementation: ReleaseTitleSpecification
              negate: false
              required: false
              fields:
                value: "\\bVOSTFR\\b"

        # ---------------------------------------------------------------------------
        # mHD / MHD — encodes HD efficaces, fichiers les plus petits (priorité).
        # ---------------------------------------------------------------------------
        - trash_id: fr-mhd
          trash_scores:
            default: 1000
          name: "mHD / MHD (small encode)"
          includeCustomFormatWhenRenaming: false
          specifications:
            - name: mHD or MHD in release title
              implementation: ReleaseTitleSpecification
              negate: false
              required: false
              fields:
                value: "\\b(mHD|MHD)\\b"

        # ---------------------------------------------------------------------------
        # x265 / HEVC en HD (720p / 1080p) — bonus codec efficace.
        # ---------------------------------------------------------------------------
        - trash_id: fr-x265-hd
          trash_scores:
            default: 500
          name: "x265 / HEVC (HD)"
          includeCustomFormatWhenRenaming: false
          specifications:
            - name: x265 / HEVC codec
              implementation: ReleaseTitleSpecification
              negate: false
              required: true
              fields:
                value: "\\b(x265|h\\.?265|hevc)\\b"
            - name: Not 2160p
              implementation: ResolutionSpecification
              negate: true
              required: true
              fields:
                value: 2160

      # ============================================================================
      # Sonarr — namespace selfhost
      # ----------------------------------------------------------------------------
      # Profil HD only (720p + 1080p), pas de 4K, pas de Remux, scoring agressif
      # pour les encodes mHD x265.
      # ============================================================================
      sonarr:
        main:
          base_url: http://sonarr.selfhost.svc.cluster.local:8989
          api_key: !env SONARR_API_KEY

          media_naming:
            series: default
            season: default
            episodes:
              rename: true
              standard: default
              daily: default
              anime: default

          quality_definition:
            type: series
            # Plafonnement plus bas que TRaSH par défaut pour favoriser les encodes
            # compressés. Valeurs en MB/min (normalisées par durée d'épisode).
            qualities:
              - quality: WEBDL-1080p
                min: 2
                preferred: 30
                max: 60
              - quality: WEBRip-1080p
                min: 2
                preferred: 30
                max: 60
              - quality: Bluray-1080p
                min: 2
                preferred: 50
                max: 80
              - quality: HDTV-1080p
                min: 2
                preferred: 25
                max: 45
              - quality: WEBDL-720p
                min: 2
                preferred: 20
                max: 40
              - quality: WEBRip-720p
                min: 2
                preferred: 20
                max: 40
              - quality: Bluray-720p
                min: 2
                preferred: 30
                max: 50
              - quality: HDTV-720p
                min: 2
                preferred: 15
                max: 30

          quality_profiles:
            - name: MULTi.VF
              reset_unmatched_scores:
                enabled: true
              upgrade:
                allowed: true
                until_quality: Bluray-1080p
                until_score: 2000
                min_format_score: 50
              min_format_score: 0
              quality_sort: top
              qualities:
                - name: Bluray-1080p
                - name: WEB 1080p
                  qualities:
                    - WEBDL-1080p
                    - WEBRip-1080p
                - name: HDTV-1080p
                - name: Bluray-720p
                - name: WEB 720p
                  qualities:
                    - WEBDL-720p
                    - WEBRip-720p
                - name: HDTV-720p

          custom_formats:
            - trash_ids:
                - fr-vff
                - fr-vfi
                - fr-vfq
                - fr-multi
              assign_scores_to:
                - name: MULTi.VF

            - trash_ids:
                - fr-vostfr
              assign_scores_to:
                - name: MULTi.VF

            - trash_ids:
                - fr-mhd
                - fr-x265-hd
              assign_scores_to:
                - name: MULTi.VF

      # ============================================================================
      # Radarr — namespace selfhost
      # ----------------------------------------------------------------------------
      # Mêmes principes que Sonarr : HD only, priorité mHD x265.
      # ============================================================================
      radarr:
        main:
          base_url: http://radarr.selfhost.svc.cluster.local:7878
          api_key: !env RADARR_API_KEY

          media_naming:
            folder: default
            movie:
              rename: true
              standard: default

          quality_definition:
            type: movie
            qualities:
              - quality: WEBDL-1080p
                min: 2
                preferred: 25
                max: 50
              - quality: WEBRip-1080p
                min: 2
                preferred: 25
                max: 50
              - quality: Bluray-1080p
                min: 2
                preferred: 40
                max: 70
              - quality: HDTV-1080p
                min: 2
                preferred: 20
                max: 40
              - quality: WEBDL-720p
                min: 2
                preferred: 15
                max: 30
              - quality: WEBRip-720p
                min: 2
                preferred: 15
                max: 30
              - quality: Bluray-720p
                min: 2
                preferred: 25
                max: 40
              - quality: HDTV-720p
                min: 2
                preferred: 12
                max: 25

          quality_profiles:
            - name: MULTi.VF
              reset_unmatched_scores:
                enabled: true
              upgrade:
                allowed: true
                until_quality: Bluray-1080p
