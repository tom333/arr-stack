apiVersion: apps/v1
kind: Deployment
metadata:
  name: cleanuparr
  labels:
    app.kubernetes.io/controller: main
    app.kubernetes.io/instance: arr-stack
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: arr-stack
    helm.sh/chart: cleanuparr-5.0.0
  namespace: selfhost
spec:
  revisionHistoryLimit: 3
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/controller: main
      app.kubernetes.io/name: arr-stack
      app.kubernetes.io/instance: arr-stack
  template:
    metadata:
      labels: 
        app.kubernetes.io/controller: main
        app.kubernetes.io/instance: arr-stack
        app.kubernetes.io/name: arr-stack
    spec: 
      enableServiceLinks: false
      serviceAccountName: arr-stack
      automountServiceAccountToken: false
      hostIPC: false
      hostNetwork: false
      hostPID: false
      dnsPolicy: ClusterFirst
      containers: 
        - env:
          - name: TZ
            value: Europe/Paris
          image: ghcr.io/cleanuparr/cleanuparr:2.3.3
          name: main
          volumeMounts:
          - mountPath: /config
            name: config
      volumes: 
        - name: config
          persistentVolumeClaim:
            claimName: cleanuparr
