# Source: arr-stack/charts/arrconf/templates/common.yaml
apiVersion: batch/v1
kind: CronJob
metadata:
  name: arrconf
  labels:
    app.kubernetes.io/controller: main
    app.kubernetes.io/instance: arr-stack
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: arr-stack
    helm.sh/chart: arrconf-5.0.0
  namespace: selfhost
spec:
  suspend: false
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 600
  schedule: "0 */4 * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      backoffLimit: 6
      template:
        metadata:
          labels: 
            app.kubernetes.io/controller: main
            app.kubernetes.io/instance: arr-stack
            app.kubernetes.io/name: arr-stack
        spec: 
          enableServiceLinks: false
          serviceAccountName: arr-stack
          automountServiceAccountToken: false
          securityContext: 
            runAsGroup: 1000
            runAsNonRoot: true
            runAsUser: 1000
          hostIPC: false
          hostNetwork: false
          hostPID: false
          dnsPolicy: ClusterFirst
          restartPolicy: Never
          containers: 
            - args:
              - --config
              - /app/config/arrconf.yml
              - apply
              - --apps
              - sonarr,radarr,prowlarr
              env:
              - name: ARRCONF_DRY_RUN
                value: "false"
              - name: ARRCONF_LOG_LEVEL
                value: INFO
              - name: TZ
                value: Europe/Paris
              envFrom:
              - secretRef:
                  name: arrconf-env
              image: ghcr.io/tom333/arr-stack-arrconf:0.2.1
              imagePullPolicy: IfNotPresent
              name: main
              resources:
                limits:
                  cpu: 500m
                  memory: 512Mi
                requests:
                  cpu: 50m
                  memory: 128Mi
              volumeMounts:
              - mountPath: /app/config/arrconf.yml
                name: config
                readOnly: true
                subPath: arrconf.yml
          volumes: 
            - configMap:
                name: arrconf-config
              name: config
