name: chart-lint

on:
  push:
    branches: [main]
    paths:
      - "charts/**"
      - "tools/arrconf/**"          # REQ-paths-filter-arrconf — arrconf-only commits trigger auto-tag chain
      - "examples/values-prod.yaml"
      - ".github/workflows/chart-lint.yml"
      - ".github/workflows/arrconf-image.yml"
      - "renovate.json"
      - "tools/scripts/**"
  pull_request:
    paths:
      - "charts/**"
      - "tools/arrconf/**"          # REQ-paths-filter-arrconf — arrconf-only commits trigger auto-tag chain
      - "examples/values-prod.yaml"
      - ".github/workflows/chart-lint.yml"
      - ".github/workflows/arrconf-image.yml"
      - "renovate.json"
      - "tools/scripts/**"

jobs:
  lint:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.18.0  # >=3.18 required by app-template 5.0.0

      - name: Add bjw-s Helm repo
        run: helm repo add bjw-s-labs https://bjw-s-labs.github.io/helm-charts

      - name: Vendor app-template (multi-alias workaround)
        run: |
          # All 15 aliases depend on the same chart (app-template 5.0.0); helm needs a
          # copy under charts/<alias>/ for each (issue #12748: without it, helm template
          # fails "found in Chart.yaml, but missing in charts/").
          # charts/arr-stack/charts/app-template/ is COMMITTED (see .gitignore note; only
          # the .tgz is ignored), so it is the source of truth — no fetch needed. The old
          # `helm dependency build` + tar-the-.tgz was flaky (the .tgz is gitignored, so
          # build had to recreate it but with 15 aliases sometimes deleted it as
          # "outdated" → tar failed intermittently). Just fan the committed dir out.
          test -f charts/arr-stack/charts/app-template/Chart.yaml \
            || { echo "Vendor failed: committed charts/arr-stack/charts/app-template/ missing"; exit 1; }
          for alias in sonarr radarr prowlarr qbittorrent cleanuparr seerr flaresolverr jellyfin suggestarr arrconf configarr cross-seed qbit-manage arrconf-mcp arr-dashboard; do
            [ ! -d "charts/arr-stack/charts/$alias" ] && cp -r charts/arr-stack/charts/app-template "charts/arr-stack/charts/$alias"
          done

      - name: helm lint (with values.schema.json validation)
        run: |
          helm lint charts/arr-stack/ -f examples/values-prod.yaml

      - name: helm template
        run: |
          helm template arr-stack charts/arr-stack/ \
            -f examples/values-prod.yaml \
            > /tmp/manifests.yaml

      - name: Install kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz \
            | sudo tar xz -C /usr/local/bin/

      - name: kubeconform
        run: |
          kubeconform \
            -kubernetes-version 1.33.0 \
            -strict \
            -ignore-missing-schemas \
            /tmp/manifests.yaml

      - name: Renovate annotation contract (every repository line has a renovate annotation above)
        run: |
          chmod +x tools/scripts/check-renovate-annotations.sh
          tools/scripts/check-renovate-annotations.sh charts/arr-stack/values.yaml

      - name: ":latest tag guard (C9 no :latest invariant)"
        run: |
          if grep -q 'tag: latest' charts/arr-stack/values.yaml; then
            echo "ERROR: 'tag: latest' found in values.yaml — pin to a semver per D-04-PIN-01"
            grep -n 'tag: latest' charts/arr-stack/values.yaml
            exit 1
          fi
          echo "OK: no :latest tags in values.yaml"

      - name: "cronJobConfig regression guard (v4-era key forbidden in v5 chart)"
        run: |
          if grep -q 'cronJobConfig:' charts/arr-stack/values.yaml; then
            echo "ERROR: 'cronJobConfig:' is the v4 key — app-template 5.0.0 uses 'cronjob:' (RESEARCH Pitfall 5)"
            grep -n 'cronJobConfig:' charts/arr-stack/values.yaml
            exit 1
          fi
          echo "OK: no v4-era cronJobConfig: keys in values.yaml"

      - name: "repository_dispatch trigger guard (D-05.1-GUARD-01)"
        run: |
          if ! grep -q "repository_dispatch:" .github/workflows/arrconf-image.yml; then
            echo "ERROR: repository_dispatch trigger removed from arrconf-image.yml"
            echo "This breaks the tag -> image build chain (D-05-CI-AUTOTAG-CHAIN)."
            exit 1
          fi
          if ! grep -q "workflow_dispatch:" .github/workflows/arrconf-image.yml; then
            echo "ERROR: workflow_dispatch rescue trigger removed from arrconf-image.yml"
            exit 1
          fi
          echo "OK: repository_dispatch + workflow_dispatch triggers present"

      - name: customManagers regex synthetic test (>= 14 matches in values.yaml)
        run: |
          python3 <<'PY'
          import json, re, sys
          with open('renovate.json') as f:
              cfg = json.load(f)
          managers = [m for m in cfg.get('customManagers', []) if m.get('customType') == 'regex']
          if not managers:
              print('ERROR: no customManagers/regex entry in renovate.json')
              sys.exit(1)
          with open('charts/arr-stack/values.yaml') as f:
              values = f.read()
          total_matches = 0
          for mgr in managers:
              for pat in mgr.get('matchStrings', []):
                  # Renovate uses JS-regex (?<name>...) named-group syntax; Python's re module
                  # requires (?P<name>...) — convert on-the-fly for the local synthetic test.
                  py_pat = re.sub(r'\(\?<(?P<n>[A-Za-z_][A-Za-z0-9_]*)>', r'(?P<\g<n>>', pat)
                  matches = re.findall(py_pat, values)
                  total_matches += len(matches)
                  print(f'pattern matched {len(matches)} times: {pat!r}')
          if total_matches < 14:
              print(f'ERROR: expected >= 14 image matches, got {total_matches}')
              sys.exit(1)
          print(f'OK: {total_matches} image matches (>= 14 required)')
          PY

      - name: Set up Node 22 (renovate-config-validator requires node ^20.15 || ^22.11)
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Validate renovate.json
        run: |
          # `renovate-config-validator` is a binary shipped inside the `renovate` package
          # (not its own npm package on npmjs.com — see Renovate docs §"Config Validation").
          # Install renovate globally first, then run the bundled validator.
          npm install -g renovate@39
          renovate-config-validator renovate.json

  tag:
    needs: lint
    runs-on: ubuntu-24.04
    # B3 Path A: auto-tag patch on every push-to-main that passes lint.
    # Renovate-PR merges land here; their tag triggers my-kluster's Renovate scan
    # which is what closes SC#2 (REQ-pr-to-cluster-latency).
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Auto-tag patch bump
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          tag_prefix: v
          release_branches: main

      - name: Dispatch arrconf-image build for new tag
        if: steps.tag.outputs.new_tag != ''
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api -X POST "repos/${{ github.repository }}/dispatches" \
            -f event_type=arrconf-image-build \
            -f client_payload[tag]="${{ steps.tag.outputs.new_tag }}"
          echo "Dispatched arrconf-image build for tag ${{ steps.tag.outputs.new_tag }}"

      - name: Dispatch arrconf-mcp-image build for new tag
        if: steps.tag.outputs.new_tag != ''
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api -X POST "repos/${{ github.repository }}/dispatches" \
            -f event_type=arrconf-mcp-image-build \
            -f client_payload[tag]="${{ steps.tag.outputs.new_tag }}"
          echo "Dispatched arrconf-mcp-image build for tag ${{ steps.tag.outputs.new_tag }}"

      - name: Dispatch arr-dashboard-image build for new tag
        if: steps.tag.outputs.new_tag != ''
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api -X POST "repos/${{ github.repository }}/dispatches" \
            -f event_type=arr-dashboard-image-build \
            -f client_payload[tag]="${{ steps.tag.outputs.new_tag }}"
          echo "Dispatched arr-dashboard-image build for tag ${{ steps.tag.outputs.new_tag }}"
