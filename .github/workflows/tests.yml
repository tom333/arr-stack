name: tests

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'tools/arrconf/**'
      - 'tools/arrconf-ui/**'
      - 'tools/arrconf-mcp/**'
      - 'tools/arr-dashboard/**'
      - 'schemas/**'
      - 'examples/**'
      - 'charts/arr-stack/files/**'
      - '.github/workflows/tests.yml'
  push:
    branches: [main]
    paths:
      - 'tools/arrconf/**'
      - 'tools/arrconf-ui/**'
      - 'tools/arrconf-mcp/**'
      - 'tools/arr-dashboard/**'
      - 'schemas/**'
      - 'examples/**'
      - 'charts/arr-stack/files/**'
      - '.github/workflows/tests.yml'

jobs:
  test:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    defaults:
      run:
        working-directory: tools/arrconf
    steps:
      - uses: actions/checkout@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.x"
          python-version: "3.13"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Type check (mypy strict)
        run: uv run mypy arrconf

      - name: Run tests with coverage
        run: uv run pytest --cov --cov-report=term-missing --cov-fail-under=70

      - name: Verify schema reproducibility (D-15)
        working-directory: ${{ github.workspace }}
        run: |
          cd tools/arrconf
          uv run arrconf schema-gen --output ../../schemas/arrconf-schema.json
          cd ../..
          git diff --exit-code -- schemas/arrconf-schema.json \
            || (echo "::error::schemas/arrconf-schema.json drift — run 'cd tools/arrconf && uv run arrconf schema-gen --output ../../schemas/arrconf-schema.json' and commit"; exit 1)

      - name: Verify intent-schema reproducibility (INTENT-01)
        working-directory: ${{ github.workspace }}
        run: |
          cd tools/arrconf
          uv run arrconf intent-schema-gen --output ../../schemas/intent-schema.json
          cd ../..
          git diff --exit-code -- schemas/intent-schema.json \
            || (echo "::error::schemas/intent-schema.json drift — run 'cd tools/arrconf && uv run arrconf intent-schema-gen --output ../../schemas/intent-schema.json' and commit"; exit 1)

      - name: Audit fixtures for non-redacted secrets (T-01-07)
        working-directory: ${{ github.workspace }}
        run: |
          # Look for plausible API keys / passwords / tokens in test fixtures.
          # Allowed: ***REDACTED***, test-api-key-..., empty strings.
          # NB: `if pipeline | head -20; then` is always true (head exits 0 on empty
          # input), so capture the filtered matches and check non-emptiness.
          MATCHES=$(grep -rEn '(api[_-]?key|password|token)["'\'']?\s*[:=]\s*["'\''][A-Za-z0-9]{20,}["'\'']' tools/arrconf/tests/fixtures/ 2>/dev/null \
            | grep -vE '(REDACTED|test-api-key-|""'\'')' \
            || true)
          if [ -n "$MATCHES" ]; then
            echo "$MATCHES" | head -20
            echo "::error::Potential real secret found in tests/fixtures/. Sanitize before commit (D-22, T-01-07)."
            exit 1
          fi
          echo "Fixture audit clean."

      - name: Verify baseline YAML modeline (D-16, Pitfall 5)
        working-directory: ${{ github.workspace }}
        run: |
          if [ -f examples/baseline-sonarr.yml ]; then
            head -1 examples/baseline-sonarr.yml | grep -qF '# yaml-language-server: $schema=../schemas/arrconf-schema.json' \
              || (echo "::error::examples/baseline-sonarr.yml missing yaml-language-server modeline (D-16, Pitfall 5)"; exit 1)
          fi

  arrconf-ui-backend:
    # Phase 17 — REQ-arrconf-ui-ci. Python triad on the FastAPI backend.
    # No --cov-fail-under (D-17-COVERAGE-01 — UI backend is glue, threshold deferred).
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    defaults:
      run:
        working-directory: tools/arrconf-ui
    steps:
      - uses: actions/checkout@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.x"
          python-version: "3.13"
          enable-cache: true

      - name: Install dependencies (frozen, includes sibling editable arrconf)
        run: uv sync --frozen

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Type check (mypy)
        run: uv run mypy .

      - name: Run tests
        run: uv run pytest -q

      - name: Verify configarr schema reproducibility (CFGUI-07)
        working-directory: ${{ github.workspace }}
        run: |
          cd tools/arrconf-ui
          uv run python -m arrconf_ui.configarr_schema_gen
          cd ../..
          git diff --exit-code -- schemas/configarr-schema.json \
            || (echo "::error::schemas/configarr-schema.json drift — run 'cd tools/arrconf-ui && uv run python -m arrconf_ui.configarr_schema_gen' and commit"; exit 1)

  arrconf-mcp:
    # MCP server (Phase 1). Python triad + pytest on the stdio MCP package.
    # Reuses arrconf as a sibling editable path dep (uv.sources).
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    defaults:
      run:
        working-directory: tools/arrconf-mcp
    steps:
      - uses: actions/checkout@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.x"
          python-version: "3.13"
          enable-cache: true

      - name: Install dependencies (frozen, includes sibling editable arrconf)
        run: uv sync --frozen

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Type check (mypy)
        run: uv run mypy arrconf_mcp

      - name: Run tests
        run: uv run pytest -q

  arr-dashboard:
    # arr-dashboard read-only service (Phase 7). Python triad + pytest with coverage gate.
    # Reuses arrconf as a sibling editable path dep (uv.sources).
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    defaults:
      run:
        working-directory: tools/arr-dashboard
    steps:
      - uses: actions/checkout@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.x"
          python-version: "3.13"
          enable-cache: true

      - name: Install dependencies (frozen, includes sibling editable arrconf)
        run: uv sync --frozen

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Type check (mypy)
        run: uv run mypy arr_dashboard

      - name: Run tests with coverage
        run: uv run pytest --cov=arr_dashboard --cov-report=term-missing --cov-fail-under=70

  arr-dashboard-frontend:
    # arr-dashboard Svelte/Vite frontend (Phase 7). Mirrors arrconf-ui-frontend.
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    defaults:
      run:
        working-directory: tools/arr-dashboard/web
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node 22 (D-17-NODE-01 — hardcoded LTS active)
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: tools/arr-dashboard/web/package-lock.json

      - name: Install dependencies (npm ci — deterministic from package-lock.json)
        run: npm ci

      - name: Build (Vite)
        run: npm run build

  arrconf-ui-frontend:
    # Phase 17 — REQ-arrconf-ui-ci. Full Svelte/Vite quad.
    # D-17-FRONTEND-01: ci + check + typecheck + build (tsc --noEmit catches pure .ts files
    # not covered by svelte-check).
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    defaults:
      run:
        working-directory: tools/arrconf-ui/web
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node 22 (D-17-NODE-01 — hardcoded LTS active)
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: tools/arrconf-ui/web/package-lock.json

      - name: Install dependencies (npm ci — deterministic from package-lock.json)
        run: npm ci

      - name: svelte-check
        run: npm run check

      - name: TypeScript no-emit (catches pure .ts files outside .svelte)
        run: npm run typecheck

      - name: Build (Vite)
        run: npm run build

  generate-idempotence:
    # INTENT-03 — CI guard: fail if committed configs drift from intent.yml.
    # Kept in tests.yml (NOT chart-lint.yml) to stay isolated from the
    # mathieudutour auto-tagger (D-09).
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    defaults:
      run:
        working-directory: tools/arrconf
    steps:
      - uses: actions/checkout@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.x"
          python-version: "3.13"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Verify generate idempotence (INTENT-03)
        working-directory: ${{ github.workspace }}
        run: |
          cd tools/arrconf
          uv run arrconf generate --check \
            --intent ../../charts/arr-stack/files/intent.yml \
            --output-dir ../../charts/arr-stack/files/ \
            || (echo "::error::Generated configs drift from intent.yml (cross-seed/config.js, qbit_manage/config.yml, arrconf.yml, or configarr.yml) — run 'cd tools/arrconf && uv run arrconf generate --intent ../../charts/arr-stack/files/intent.yml --output-dir ../../charts/arr-stack/files/' and commit"; exit 1)
