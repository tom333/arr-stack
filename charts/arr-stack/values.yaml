# Wave 4 (Plan 04-05) populates the next 2:
arrconf:
  global:
    nameOverride: arrconf
    fullnameOverride: arrconf
  serviceAccount:
    arrconf: {}
  controllers:
    main:
      type: cronjob
      cronjob:
        schedule: "0 */4 * * *"
        concurrencyPolicy: Forbid
        successfulJobsHistory: 1
        failedJobsHistory: 2
        startingDeadlineSeconds: 600
      pod:
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
      containers:
        main:
          image:
            # renovate: image=ghcr.io/tom333/arr-stack-arrconf
            repository: ghcr.io/tom333/arr-stack-arrconf
            tag: "0.28.1"
            pullPolicy: IfNotPresent
          args:
            - "--config"
            - "/app/config/arrconf.yml"
            - "--intent"
            - "/app/config/intent.yml"   # D-32: categories vivent dans intent.yml ; apply le REQUIERT pour les apps categories-driven (sonarr/radarr/qbittorrent/jellyfin)
            - "apply"
            - "--apps"
            - "sonarr,radarr,prowlarr,qbittorrent,seerr,jellyfin"   # D-05-ARGS-01: Phase 5 adds qbittorrent ; Phase 6 adds seerr (D-06-SCOPE-01) ; Phase 7 adds jellyfin (D-07-INSTANCE-01)
          env:
            TZ: "Europe/Paris"
            ARRCONF_DRY_RUN: "false"
            ARRCONF_LOG_LEVEL: INFO
          envFrom:
            - secretRef:
                name: arrconf-env
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 50m
              memory: 128Mi
  persistence:
    config:
      type: configMap
      name: arrconf-config
      globalMounts:
        - path: /app/config/arrconf.yml
          subPath: arrconf.yml
          readOnly: true
        - path: /app/config/intent.yml
          subPath: intent.yml
          readOnly: true
configarr:
  global:
    nameOverride: configarr
    fullnameOverride: configarr
  serviceAccount:
    configarr: {}
  controllers:
    main:
      type: cronjob
      cronjob:
        schedule: "0 */4 * * *"
        concurrencyPolicy: Forbid
        successfulJobsHistory: 1
        failedJobsHistory: 2
      containers:
        main:
          image:
            # renovate: image=ghcr.io/raydak-labs/configarr
            repository: ghcr.io/raydak-labs/configarr
