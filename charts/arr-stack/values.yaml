            pullPolicy: IfNotPresent
          tty: true  # D-04-CRON-04 MANDATORY (npm process exits without TTY)
          env:
            TZ: "Europe/Paris"
          envFrom:
            - secretRef:
                name: configarr-env
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 50m
              memory: 128Mi
  persistence:
    config:
      type: configMap
      name: configarr-config
      globalMounts:
        - path: /app/config/config.yml
          subPath: config.yml
          readOnly: true
    cache:
      type: persistentVolumeClaim
      existingClaim: configarr-cache
      globalMounts:
        - path: /app/repos

# Wave 2 (Plan 14-02) — SuggestArr Helm sidecar (D-01..D-14 from .planning/phases/14-suggestarr-implementation/14-CONTEXT.md)
# Routing config (SEER_ANIME_PROFILE_CONFIG + JELLYFIN_LIBRARIES) is NOT shipped via ConfigMap —
# per 13-RESEARCH lines 488 + 492-494, SuggestArr's config persists in its PVC-backed SQLite + YAML
# and is configured via the web UI POST-DEPLOY. See 14-HUMAN-UAT.md Scenario 3 for the operator step-by-step.
suggestarr:
  global:
    nameOverride: suggestarr
    fullnameOverride: suggestarr
  serviceAccount:
    suggestarr: {}
  controllers:
    main:
      type: deployment   # SuggestArr is a daemon per 13-RESEARCH §Architecture Decision (Option C CronJob is non-viable)
      replicas: 1
      containers:
        main:
          image:
            # renovate: image=docker.io/ciuse99/suggestarr
            repository: ciuse99/suggestarr
            tag: "v2.7.3"  # Re-pin if Phase 14 kickoff is after 2026-06-22 per 13-RESEARCH §Metadata "Valid until"
            pullPolicy: IfNotPresent
          env:
            - name: TZ
              value: "Europe/Paris"
            - name: LOG_LEVEL
              value: "info"
            - name: SUGGESTARR_PORT
              value: "5000"
            # D-01 per-container env remap — arrconf-env keys are reused under SuggestArr's expected names
            - name: JELLYFIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: arrconf-env
                  key: JELLYFIN_API_KEY
            - name: SEER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: arrconf-env
                  key: SEERR_API_KEY
            - name: TMDB_API_KEY
              valueFrom:
                secretKeyRef:
                  name: arrconf-env
                  key: TMDB_API_KEY   # D-02: operator adds this key to arrconf-env in my-kluster SealedSecret (separate PR per D-13) BEFORE arr-stack PR merges
          probes:
            liveness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /api/health/live
                  port: 5000
                initialDelaySeconds: 30
                periodSeconds: 30
            readiness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /api/health/ready
                  port: 5000
                initialDelaySeconds: 30
                periodSeconds: 30
          resources:
            limits:
              cpu: 250m
              memory: 256Mi
            requests:
              cpu: 50m
              memory: 128Mi
  service:
    main:
      controller: main
      ports:
        http:
          port: 5000
  # D-14: NO ingress block — web UI stays cluster-internal-only.
  #       The operator accesses the web UI via `kubectl -n selfhost port-forward svc/suggestarr 5000:5000`
  #       to perform the post-deploy SEER_ANIME_PROFILE_CONFIG + JELLYFIN_LIBRARIES configuration
  #       per 14-HUMAN-UAT.md Scenario 3.
  persistence:
    # 1Gi PVC for SQLite + YAML config persistence per 13-RESEARCH §Phase 14 Implementation Guidance.
    # This is the ONLY place SuggestArr's routing config lives — there is NO ConfigMap-shipped routing file.
    config:
      type: persistentVolumeClaim
      accessMode: ReadWriteOnce
      size: 1Gi
      globalMounts:
        - path: /app/config/config_files

cross-seed:
  global:
    nameOverride: cross-seed
    fullnameOverride: cross-seed
  serviceAccount:
    cross-seed: {}
  controllers:
    main:
      type: deployment   # D-03: daemon mode, long-running, port 2468
      replicas: 1
      initContainers:
        config-init:
          image:
            # renovate: image=ghcr.io/cross-seed/cross-seed
            repository: ghcr.io/cross-seed/cross-seed
            tag: "6.13.7"
            pullPolicy: IfNotPresent
          command:
            - node
            - -e
            - |
              const fs = require('fs');
              let c = fs.readFileSync('/config-cm/config.js', 'utf8');
              c = c.replace(/\$\{PROWLARR_API_KEY\}/g, process.env.PROWLARR_API_KEY || '');
              c = c.replace(/\$\{QBT_USER\}/g, process.env.QBT_USER || '');
              c = c.replace(/\$\{QBT_PASS\}/g, process.env.QBT_PASS || '');
              fs.writeFileSync('/config-resolved/config.js', c);
          envFrom:
            - secretRef:
                name: arrconf-env
      containers:
        main:
          image:
            # renovate: image=ghcr.io/cross-seed/cross-seed
            repository: ghcr.io/cross-seed/cross-seed
            tag: "6.13.7"
            pullPolicy: IfNotPresent
          args:
            - daemon
          env:
            TZ: "Europe/Paris"
          envFrom:
            - secretRef:
                name: arrconf-env
          probes:
            liveness:
              enabled: true
              custom: true
              spec:
                tcpSocket:
                  port: 2468
                initialDelaySeconds: 30
                periodSeconds: 30
            readiness:
              enabled: true
              custom: true
              spec:
                tcpSocket:
                  port: 2468
                initialDelaySeconds: 30
                periodSeconds: 30
          resources:
            limits:
              cpu: 250m
              memory: 256Mi
            requests:
              cpu: 50m
              memory: 128Mi
  service:
    main:
      controller: main
      ports:
        http:
          port: 2468
  # NO ingress block — cluster-internal only (mirror suggestarr D-14); access via port-forward.
  persistence:
    # Read-only ConfigMap with the ${...}-tokenised config.js. Mounted ONLY into the
    # initContainer (it is the substitution SOURCE; the main container never reads it).
    config-cm:
      type: configMap
      name: cross-seed-config
      advancedMounts:
        main:
          config-init:
            - path: /config-cm/config.js
              subPath: config.js
              readOnly: true
    # Writable scratch emptyDir. The initContainer WRITES the resolved file to
    # /config-resolved/config.js; the main container SURFACES that same file at
    # /config/config.js via subPath so it does NOT shadow the PVC at /config (Pitfall 1).
    config-resolved:
      type: emptyDir
      advancedMounts:
        main:
          config-init:
            - path: /config-resolved
          main:
            - path: /config/config.js
              subPath: config.js
    # PVC holds cross-seed state (config.db, torrent_cache/). Mounts at /config in the
    # main container only; the subPath file mount above sits inside it without shadowing it.
    config:
      existingClaim: cross-seed-config
      advancedMounts:
        main:
          main:
            - path: /config
    torrents:
      type: hostPath
      hostPath: /media/data/torrents
      hostPathType: DirectoryOrCreate
      advancedMounts:
        main:
          main:
            - path: /data
    media:
      # NAS NFS — bibliothèque. RW (cross-seed crée /media/.cross-seed + les hardlinks).
      # data_dirs scannés ici ; link_dirs (/media/.cross-seed) sur le même fs → hardlink OK.
      type: persistentVolumeClaim
      existingClaim: media-nas-pvc
      advancedMounts:
        main:
          main:
            - path: /media

qbit-manage:
  global:
    nameOverride: qbit-manage
    fullnameOverride: qbit-manage
  serviceAccount:
    qbit-manage: {}
  controllers:
    main:
      type: cronjob
      cronjob:
        schedule: "0 */4 * * *"
        concurrencyPolicy: Forbid
        successfulJobsHistory: 1
        failedJobsHistory: 2
        startingDeadlineSeconds: 600
      initContainers:
        # qbit_manage rewrites /config/config.yml on startup (normalisation + state),
        # so the config cannot be a read-only ConfigMap subPath (Errno 30 read-only FS).
        # Mirror the cross-seed pattern: copy the committed ConfigMap into a writable
        # emptyDir at /config. No token substitution needed — qbit_manage resolves
        # !ENV QBT_USER/QBT_PASS itself from envFrom (arrconf-env).
        config-init:
          image:
            # renovate: image=ghcr.io/stuffanthings/qbit_manage
            repository: ghcr.io/stuffanthings/qbit_manage
            tag: "v4.8.0"
            pullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - cp /config-cm/config.yml /config/config.yml
      containers:
        main:
          image:
            # renovate: image=ghcr.io/stuffanthings/qbit_manage
            repository: ghcr.io/stuffanthings/qbit_manage
            tag: "v4.8.0"
            pullPolicy: IfNotPresent
          env:
            TZ: "Europe/Paris"
            QBT_RUN: "true"
            QBT_SCHEDULE: "0"
            QBT_DRY_RUN: "false"
            # Disable the v4.6 web API server so the CronJob runs once and EXITS
            # (otherwise uvicorn stays up → Job never completes).
            QBT_WEB_SERVER: "false"
          envFrom:
            - secretRef:
                name: arrconf-env
          resources:
            limits:
              cpu: 250m
              memory: 256Mi
            requests:
              cpu: 50m
              memory: 128Mi
  persistence:
    # Read-only ConfigMap with the generated config.yml — mounted ONLY into the
    # initContainer (copy source). The main container never reads it directly.
    config-cm:
      type: configMap
      name: qbit-manage-config
      advancedMounts:
        main:
          config-init:
            - path: /config-cm/config.yml
              subPath: config.yml
              readOnly: true
    # Writable scratch: initContainer copies config.yml here; main runs against it.
    config:
      type: emptyDir
      advancedMounts:
        main:
          config-init:
            - path: /config
          main:
            - path: /config
    # qBit torrents root — so config.yml's directory.root_dir (/data/torrents) and
    # recycle_bin resolve on disk (recyclebin / orphaned / noHL file ops). Same
    # hostPath as qbittorrent + cross-seed (/media/data/torrents → /data).
    torrents:
      type: hostPath
      hostPath: /media/data/torrents
      hostPathType: DirectoryOrCreate
      advancedMounts:
        main:
          main:
            - path: /data
