qbittorrent:
  global:
    fullnameOverride: qbittorrent
  controllers:
    main:
      containers:
        main:
          image:
            # renovate: image=lscr.io/linuxserver/qbittorrent
            repository: lscr.io/linuxserver/qbittorrent
            tag: "5.2.0"  # pinned per D-04-PIN-01 from evidence/current-image-tags.txt digest sha256:2e0148... (was: latest)
          env:
            TZ: "Europe/Paris"
            PUID: "1000"
            PGID: "1000"
            WEBUI_PORT: "8080"
  service:
    main:
      controller: main
      ports:
        http:
          port: 8080
  ingress:
    main:
      className: nginx
      annotations:
        cert-manager.io/cluster-issuer: "letsencrypt-prod"
        nginx.ingress.kubernetes.io/auth-url: "https://auth.tgu.ovh/oauth2/auth"
        nginx.ingress.kubernetes.io/auth-signin: "https://auth.tgu.ovh/oauth2/start?rd=https://qbittorrent.tgu.ovh"
      hosts:
        - host: qbittorrent.tgu.ovh
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: main
                port: http
      tls:
        - secretName: qbittorrent-tls
          hosts:
            - qbittorrent.tgu.ovh
  persistence:
    config:
      type: persistentVolumeClaim
      accessMode: ReadWriteOnce
      size: 1Gi
      globalMounts:
        - path: /config
    torrents:
      # Stockage local sur le nœud MicroK8s
      # Partage le même path que Radarr/Sonarr pour accéder aux fichiers téléchargés
      type: hostPath
      hostPath: /opt/media-stack/torrents
      hostPathType: DirectoryOrCreate
      globalMounts:
        - path: /data

