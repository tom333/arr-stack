qbittorrent:
  global:
    nameOverride: qbittorrent
    fullnameOverride: qbittorrent
  serviceAccount:
    qbittorrent: {}
  controllers:
    main:
      containers:
        main:
          image:
            # renovate: image=lscr.io/linuxserver/qbittorrent
            repository: lscr.io/linuxserver/qbittorrent
            tag: "5.2.0"  # pinned per D-04-PIN-01 from evidence/current-image-tags.txt digest sha256:2e0148... (was: latest)
          env:
            TZ: "Europe/Paris"
            PUID: "1000"
            PGID: "1000"
            WEBUI_PORT: "8080"
  service:
    # SINGLE service named `qbittorrent` — a second service makes app-template
    # suffix ALL service names (qbittorrent → qbittorrent-main), breaking every
    # consumer that dials qbittorrent.selfhost.svc.cluster.local:8080 (Sonarr/
    # Radarr download clients, arrconf). Keep one service to preserve the name.
    # Type NodePort exposes BitTorrent 6881 (TCP+UDP) on the node for the MikroTik
    # dst-nat WAN:6881 → node:6881; http:8080 stays reachable via the ClusterIP
    # (NodePort services keep a ClusterIP) so the ingress + in-cluster DNS are
    # unaffected. nodePort=6881 requires microk8s --service-node-port-range to
    # include 6881 (default 30000-32767 excludes it).
    main:
      controller: main
      type: NodePort
      ports:
        http:
          port: 8080
        bt-tcp:
          port: 6881
          protocol: TCP
          nodePort: 6881
        bt-udp:
          port: 6881
          protocol: UDP
          nodePort: 6881
  ingress:
    main:
      className: nginx
      annotations:
        cert-manager.io/cluster-issuer: "letsencrypt-prod"
        traefik.ingress.kubernetes.io/router.middlewares: "selfhost-oauth2-forwardauth@kubernetescrd"
      hosts:
        - host: qbittorrent.tgu.ovh
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: main
                port: http
      tls:
        - secretName: qbittorrent-tls
          hosts:
            - qbittorrent.tgu.ovh
  persistence:
    config:
      type: persistentVolumeClaim
      accessMode: ReadWriteOnce
      size: 1Gi
      globalMounts:
        - path: /config
    torrents:
      # Stockage local sur le nœud MicroK8s
      # Partage le même path que Radarr/Sonarr pour accéder aux fichiers téléchargés
      # 2026-05-16: moved from /opt/media-stack/torrents (sda2, 84% full) to /media/data/torrents (sdb1, 52% full)
      type: hostPath
      hostPath: /media/data/torrents
      hostPathType: DirectoryOrCreate
      globalMounts:
        - path: /data
    media:
      # NAS NFS — bibliothèque. Monté pour seeder les hardlinks cross-seed posés sur
      # le NFS (/media/.cross-seed) : library re-seed (B). Même PVC que Sonarr/Radarr/Jellyfin.
      type: persistentVolumeClaim
      existingClaim: media-nas-pvc
      globalMounts:
        - path: /media

