flaresolverr:
  global:
    fullnameOverride: flaresolverr
  controllers:
    main:
      containers:
        main:
          image:
            # renovate: image=ghcr.io/flaresolverr/flaresolverr
            repository: ghcr.io/flaresolverr/flaresolverr
            tag: "v3.4.6"  # pinned per D-04-PIN-01 from evidence/current-image-tags.txt digest sha256:7962759d... (was: latest)
          env:
            TZ: "Europe/Paris"
            LOG_LEVEL: "info"
  service:
    main:
      controller: main
      ports:
        http:
          port: 8191
  # Pas d'ingress : accès interne uniquement
  # URL depuis les autres pods : http://flaresolverr.selfhost.svc.cluster.local:8191
jellyfin:
  global:
    fullnameOverride: jellyfin
  controllers:
    main:
      containers:
        main:
          image:
            # renovate: image=lscr.io/linuxserver/jellyfin
            repository: lscr.io/linuxserver/jellyfin
            tag: "10.11.8"
          env:
            TZ: "Europe/Paris"
            PUID: "1000"
            PGID: "1000"
  service:
    main:
      controller: main
      ports:
        http:
          port: 8096
  ingress:
    main:
      className: nginx
      annotations:
        cert-manager.io/cluster-issuer: "letsencrypt-prod"
        # Pas d'oauth2-proxy : Jellyfin gère sa propre authentification
        # ⚠️ Créer le compte admin immédiatement après le premier déploiement
        nginx.ingress.kubernetes.io/proxy-body-size: "0"
      hosts:
        - host: jellyfin.tgu.ovh
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: main
                port: http
      tls:
        - secretName: jellyfin-tls
          hosts:
            - jellyfin.tgu.ovh
  persistence:
    config:
      # Stockage local : BDD SQLite, cache de transcoding, métadonnées (thumbnails, etc.)
      type: persistentVolumeClaim
      accessMode: ReadWriteOnce
      size: 10Gi
      globalMounts:
        - path: /config
    media:
      # NAS NFS — bibliothèque partagée avec Radarr/Sonarr
      type: persistentVolumeClaim
      existingClaim: media-nas-pvc
      globalMounts:
        - path: /media

