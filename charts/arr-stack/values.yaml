# charts/arr-stack/values.yaml
# Each top-level key matches a dependency alias in Chart.yaml.
# Per-app bodies are populated by Plans 04-03 (sonarr/radarr/prowlarr/qbittorrent),
# 04-04 (cleanuparr/seerr/flaresolverr/jellyfin), and 04-05 (arrconf/configarr).

# Wave 2 (Plan 04-03) populates the next 4:
sonarr:
  global:
    nameOverride: sonarr
    fullnameOverride: sonarr
  serviceAccount:
    sonarr: {}
  controllers:
    main:
      containers:
        main:
          image:
            # renovate: image=lscr.io/linuxserver/sonarr
            repository: lscr.io/linuxserver/sonarr
            tag: "4.0.17"
          env:
            TZ: "Europe/Paris"
            PUID: "1000"
            PGID: "1000"
  service:
    main:
      controller: main
      ports:
        http:
          port: 8989
  ingress:
    main:
      className: nginx
      annotations:
        cert-manager.io/cluster-issuer: "letsencrypt-prod"
        traefik.ingress.kubernetes.io/router.middlewares: "selfhost-oauth2-forwardauth@kubernetescrd"
      hosts:
        - host: sonarr.tgu.ovh
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: main
                port: http
      tls:
        - secretName: sonarr-tls
          hosts:
            - sonarr.tgu.ovh
  persistence:
    config:
      type: persistentVolumeClaim
      accessMode: ReadWriteOnce
      size: 2Gi
      globalMounts:
        - path: /config
    torrents:
      # Même hostPath que qBittorrent pour accéder aux fichiers téléchargés
      # 2026-05-16: moved from /opt/media-stack/torrents (sda2, 84% full) to /media/data/torrents (sdb1, 52% full)
      type: hostPath
      hostPath: /media/data/torrents
      hostPathType: DirectoryOrCreate
      globalMounts:
        - path: /data/torrents
    media:
      # NAS NFS — destination finale des séries
      type: persistentVolumeClaim
      existingClaim: media-nas-pvc
      globalMounts:
        - path: /media
