# GENERATED by 'arrconf generate' from intent.yml — DO NOT EDIT BY HAND

commands:
  dry_run: false
  recheck: false
  cat_update: false            # QBM-02: arrconf is sole category owner
  tag_update: true
  rem_unregistered: true
  tag_tracker_error: true
  rem_orphaned: false
  tag_nohardlinks: false       # nohardlinks not configured in intent
  share_limits: true
  skip_qb_version_check: false
  skip_cleanup: false

qbt:
  host: http://qbittorrent.selfhost.svc.cluster.local:8080
  user: !ENV QBT_USER
  pass: !ENV QBT_PASS

settings:
  force_auto_tmm: false

directory:
  root_dir: /data
  recycle_bin: /data/.RecycleBin

cat:
  films: /data/films
  films-animation-enfants: /data/films-animation-enfants
  films-enfants: /data/films-enfants
  films-zoe: /data/films-zoe
  nouveaux-films: /data/nouveaux-films
  series: /data/series
  series-emilie: /data/series-emilie
  series-garcons: /data/series-garcons
  series-thomas: /data/series-thomas
  series-zoe: /data/series-zoe

tracker:
  beyond-hd:
    tag: beyond-hd
  c411.org:
    tag: c411
  torr9.net:
    tag: torr9
  other:
    tag: public

share_limits:
  group-beyond-hd:
    priority: 1
    include_all_tags:
      - beyond-hd
    max_ratio: -1.0
    max_seeding_time: -1
    min_seeding_time: 0
    cleanup: false
  group-c411:
    priority: 2
    include_all_tags:
      - c411
    max_ratio: -1.0
    max_seeding_time: -1
    min_seeding_time: 0
    cleanup: false
  group-torr9:
    priority: 3
    include_all_tags:
      - torr9
    max_ratio: -1.0
    max_seeding_time: -1
    min_seeding_time: 0
    cleanup: false
  default:
    priority: 999
    max_ratio: 2.0
    max_seeding_time: 10080
    min_seeding_time: 0
    cleanup: false

recyclebin:
  enabled: true
  empty_after_x_days: 30
  save_torrents: false
  split_by_category: false
