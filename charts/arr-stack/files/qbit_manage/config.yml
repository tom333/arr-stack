# GENERATED by 'arrconf generate' from intent.yml — DO NOT EDIT BY HAND

qbt:
  host: http://qbittorrent.selfhost.svc.cluster.local:8080
  user: !ENV QBT_USER
  pass: !ENV QBT_PASS

settings:
  force_auto_tmm: false
  cat_update: false            # QBM-02: arrconf is sole category owner
  tag_update: true
  rem_unregistered: false
  rem_orphaned: false
  tag_nohardlinks: true        # D-03: observability only
  skip_cleanup: false
  dry_run: false
  share_limits: true
  recyclebin:
    enabled: true
    empty_after_x_days: 30
    save_torrents: false

cat:
  films: /data/torrents/films
  films-animation-enfants: /data/torrents/films-animation-enfants
  films-enfants: /data/torrents/films-enfants
  films-zoe: /data/torrents/films-zoe
  nouveaux-films: /data/torrents/nouveaux-films
  series: /data/torrents/series
  series-emilie: /data/torrents/series-emilie
  series-garcons: /data/torrents/series-garcons
  series-thomas: /data/torrents/series-thomas
  series-zoe: /data/torrents/series-zoe

tracker_tags:
  beyond-hd:
    tag: beyond-hd
  other:
    tag: public

share_limits:
  group-beyond-hd:
    priority: 1
    include_all_tags:
      - beyond-hd
    max_ratio: 3.0
    max_seeding_time: -1
    min_seeding_time: 4320
    cleanup: false
  default:
    priority: 999
    max_ratio: 2.0
    max_seeding_time: 10080
    min_seeding_time: 0
    cleanup: false

nohardlinks: {}
