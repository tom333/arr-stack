        - path: /media/films-anime
        - path: /media/films-family
    download_clients:
      prune: false
      items:
        - name: qBittorrent - Movies
          enable: true
          protocol: torrent
          priority: 1
          implementation: QBittorrent
          configContract: QBittorrentSettings
          fields:
            - name: host
              value: qbittorrent.selfhost.svc.cluster.local
            - name: port
              value: 8080
            - name: useSsl
              value: false
            - name: urlBase
              value: ''
            - name: username
              value: ''
            - name: password
              value: ''
            - name: movieCategory
              value: radarr-movies
            - name: movieImportedCategory
              value: ''
            - name: recentMoviePriority
              value: 0
            - name: olderMoviePriority
              value: 0
            - name: initialState
              value: 0
            - name: sequentialOrder
              value: false
            - name: firstAndLast
              value: false
            - name: contentLayout
              value: 0
          tag_labels: [movies]
          removeCompletedDownloads: true
          removeFailedDownloads: true
        - name: qBittorrent - Anime
          enable: true
          protocol: torrent
          priority: 1
          implementation: QBittorrent
          configContract: QBittorrentSettings
          fields:
            - name: host
              value: qbittorrent.selfhost.svc.cluster.local
            - name: port
              value: 8080
            - name: useSsl
              value: false
            - name: urlBase
              value: ''
            - name: username
              value: ''
            - name: password
              value: ''
            - name: movieCategory
              value: radarr-anime
            - name: movieImportedCategory
              value: ''
            - name: recentMoviePriority
              value: 0
            - name: olderMoviePriority
              value: 0
            - name: initialState
              value: 0
            - name: sequentialOrder
              value: false
            - name: firstAndLast
              value: false
            - name: contentLayout
              value: 0
          tag_labels: [anime]
          removeCompletedDownloads: true
          removeFailedDownloads: true
        - name: qBittorrent - Family
          enable: true
          protocol: torrent
          priority: 1
          implementation: QBittorrent
          configContract: QBittorrentSettings
          fields:
            - name: host
              value: qbittorrent.selfhost.svc.cluster.local
            - name: port
              value: 8080
            - name: useSsl
              value: false
            - name: urlBase
              value: ''
            - name: username
              value: ''
            - name: password
              value: ''
            - name: movieCategory
              value: radarr-family
            - name: movieImportedCategory
              value: ''
            - name: recentMoviePriority
              value: 0
            - name: olderMoviePriority
              value: 0
            - name: initialState
              value: 0
            - name: sequentialOrder
              value: false
            - name: firstAndLast
              value: false
            - name: contentLayout
              value: 0
          tag_labels: [family]
          removeCompletedDownloads: true
          removeFailedDownloads: true
    remote_path_mappings:
      prune: false
      items:
        - host: qbittorrent.selfhost.svc.cluster.local
          remotePath: /data/complete/
          localPath: /data/torrents/complete/
        - host: qbittorrent.selfhost.svc.cluster.local
          remotePath: /data/films/
          localPath: /data/torrents/films/
        - host: qbittorrent.selfhost.svc.cluster.local
          remotePath: /data/films-anime/
          localPath: /data/torrents/films-anime/
        - host: qbittorrent.selfhost.svc.cluster.local
          remotePath: /data/films-family/
          localPath: /data/torrents/films-family/
    movie_tags:
      enable: true
      default_tag: movies

    # Phase 6 (D-06-RETAG-01): family-only on Radarr.
    # Pitfall 5: NO anime rule on Radarr.
    #   - TMDB has no "Anime" first-class genre
    #   - "Animation" would catch Pixar/Disney (false-positive)
    #   Anime films stay manual-tag until a future phase ships an
    #   originalLanguage-based filter (deferred — D-06+1).
    content_routing:
      enable: true
      rules:
        - tag: family
          keywords: ["Family"]

prowlarr:
  main:
    base_url: http://prowlarr.selfhost.svc.cluster.local:9696
    apps:
      prune: false
      items:
        - name: Sonarr
          type: sonarr
          base_url: http://sonarr.selfhost.svc.cluster.local:8989
          api_key_env: SONARR_API_KEY
          sync_level: fullSync
        - name: Radarr
          type: radarr
          base_url: http://radarr.selfhost.svc.cluster.local:7878
          api_key_env: RADARR_API_KEY
          sync_level: fullSync

qbittorrent:
  main:
    base_url: http://qbittorrent.selfhost.svc.cluster.local:8080
    categories:
      prune: false
      items:
        - name: sonarr-tv
          savePath: /data/series
        - name: sonarr-anime
          savePath: /data/anime
        - name: sonarr-family
          savePath: /data/family
        - name: radarr-movies
          savePath: /data/films
        - name: radarr-anime
          savePath: /data/films-anime
        - name: radarr-family
          savePath: /data/films-family
    preferences:
      enable: false

# Phase 6 (D-06-SCOPE-01): Seerr reconciler — single-instance per ADR-7.
# 4 resources managed:
#   1. settings/sonarr  — match by isDefault=true; writes animeTags + activeAnimeDirectory + activeAnimeProfileId + tagRequests=true
#   2. settings/radarr  — match by isDefault=true; writes tags + tagRequests=true (NO animeTags equivalent on Radarr per Seerr schema)
#   3. user[admin]      — single user; permissions=2 (ADMIN per research permissions bitmask)
#   4. settings/main    — scoped subset (defaultPermissions + defaultQuotas only); uses POST not PUT (research Pitfall 2)
# Integer ID magic numbers (recorded by Plan 06-01 in evidence/anime-profile-id-lookup.txt + snapshots/after-phase-5-2026-05-16/sonarr/tag.json):
#   activeProfileId=6               = HD - 720p/1080p (current cluster default, confirmed by live GET)
#   activeAnimeProfileId=8          = "Anime" profile (created by Phase 5 configarr, confirmed present)
#   sonarr_service.tags=[2]         = 'tv' Sonarr tag id (after-phase-5 baseline)
#   sonarr_service.animeTags=[3]    = 'anime' Sonarr tag id (after-phase-5 baseline)
#   radarr_service.tags=[2]         = 'movies' Radarr tag id (after-phase-5 baseline)
# apiKey fields are INTENTIONALLY ABSENT — preserved at reconcile-time from cluster GET (D-06-CREDS-01).
seerr:
  main:
    base_url: http://seerr.selfhost.svc.cluster.local:5055
    sonarr_service:
      hostname: sonarr.selfhost.svc.cluster.local
      port: 8989
      useSsl: false
      activeProfileId: 6
      activeDirectory: /media/series
      activeAnimeProfileId: 8
      activeAnimeDirectory: /media/anime
      tags: [2]
      animeTags: [3]
      is4k: false
      isDefault: true
      enableSeasonFolders: false
      externalUrl: ""
      syncEnabled: true
      preventSearch: false
      tagRequests: true
    radarr_service:
      hostname: radarr.selfhost.svc.cluster.local
      port: 7878
      useSsl: false
      activeProfileId: 6
      activeDirectory: /media/films
      is4k: false
      minimumAvailability: released
      tags: [2]
      isDefault: true
      externalUrl: ""
      syncEnabled: true
      preventSearch: false
      tagRequests: true
    users:
      enable: true
      prune: false
      admin:
        displayName: admin
        permissions: 2  # ADMIN per research permissions bitmask (NOT 8388608 — that is AUTO_REQUEST)
        movieQuotaDays: 0
        movieQuotaLimit: 0
        tvQuotaDays: 0
        tvQuotaLimit: 0
    main_settings:
      enable: true
      defaultPermissions: 32  # REQUEST per research permissions bitmask
      defaultQuotas:
        movie:
          quotaDays: 7
          quotaLimit: 5
        tv:
          quotaDays: 7
          quotaLimit: 5
