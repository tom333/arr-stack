# yaml-language-server: $schema=../../../schemas/intent-schema.json
# HAND-EDITED — source of truth for 'arrconf generate'

tools:
  cross_seed:
    torznab:
      # Prowlarr per-indexer torznab feeds. Only currently-working torrent indexers
      # wired (caps HTTP 200): C411=2, Torrent9=5, World-torrent=6, Torr9=7.
      # Excluded: NorTorrent=1 + ZkTorrent=3 (Prowlarr auto-disabled on failures) —
      # re-add their /N/api URLs here if they recover.
      - "http://prowlarr.selfhost.svc.cluster.local:9696/2/api?apikey=${PROWLARR_API_KEY}"
      - "http://prowlarr.selfhost.svc.cluster.local:9696/5/api?apikey=${PROWLARR_API_KEY}"
      - "http://prowlarr.selfhost.svc.cluster.local:9696/6/api?apikey=${PROWLARR_API_KEY}"
      - "http://prowlarr.selfhost.svc.cluster.local:9696/7/api?apikey=${PROWLARR_API_KEY}"
    torrent_clients:
      - "qbittorrent:http://${QBT_USER}:${QBT_PASS}@qbittorrent.selfhost.svc.cluster.local:8080"
    link_dirs:
      - "/data/torrents/cross-seed"
    link_type: hardlink
    action: inject
  qbit_manage:
    qbt_host: "http://qbittorrent.selfhost.svc.cluster.local:8080"
    tracker_tags:
      - keyword: "beyond-hd"
        tag: "beyond-hd"
    share_limits:
      - name: "group-beyond-hd"
        tracker_tag: "beyond-hd"
        max_ratio: 3.0
        max_seeding_time: -1
        min_seeding_time: 4320
        cleanup: false
        priority: 1
    recyclebin_days: 30
    rem_orphaned: false
    rem_unregistered: false

sagas: []
