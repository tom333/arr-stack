# yaml-language-server: $schema=../../../schemas/intent-schema.json
# HAND-EDITED — source of truth for 'arrconf generate'

tools:
  cross_seed:
    torznab:
      # Prowlarr per-indexer torznab feeds. Only currently-working torrent indexers
      # wired (caps HTTP 200): C411=2, Torrent9=5, World-torrent=6, Torr9=7.
      # Excluded: NorTorrent=1 + ZkTorrent=3 (Prowlarr auto-disabled on failures) —
      # re-add their /N/api URLs here if they recover.
      - "http://prowlarr.selfhost.svc.cluster.local:9696/2/api?apikey=${PROWLARR_API_KEY}"
      - "http://prowlarr.selfhost.svc.cluster.local:9696/5/api?apikey=${PROWLARR_API_KEY}"
      - "http://prowlarr.selfhost.svc.cluster.local:9696/6/api?apikey=${PROWLARR_API_KEY}"
      - "http://prowlarr.selfhost.svc.cluster.local:9696/7/api?apikey=${PROWLARR_API_KEY}"
    torrent_clients:
      - "qbittorrent:http://${QBT_USER}:${QBT_PASS}@qbittorrent.selfhost.svc.cluster.local:8080"
    # link_dirs MUST be on the same filesystem as data_dirs to hardlink. The library
    # lives on media-nas-pvc (NFS, mounted /media); qBit's download path is a node
    # hostPath (/media/data/torrents → /data) — a DIFFERENT fs. So the cross-seed link
    # dir sits on the NFS library mount, NOT under /data (else cross-fs hardlink fails).
    link_dirs:
      - "/media/.cross-seed"
    link_type: hardlink
    action: inject
    # Data-based re-seed of the imported library (B): scan the NAS library, match
    # releases on the FR trackers, inject torrents pointing at existing files → seed
    # → builds ratio on Torr9/C411 (upload allowed even when download is gated).
    # Paths are the media-nas-pvc category dirs (mounted /media in qBit + cross-seed).
    data_dirs:
      - "/media/films"
      - "/media/films-enfants"
      - "/media/films-animation-enfants"
      - "/media/films-zoe"
      - "/media/nouveaux-films"
      - "/media/series"
      - "/media/series-emilie"
      - "/media/series-garcons"
      - "/media/series-thomas"
      - "/media/series-zoe"
    search_cadence: "1 day"            # daemon scans once/day, rate-limited
    # searchCadence REQUIRES both excludes; excludeOlder must be 2-5x excludeRecentSearch.
    # NB: the periodic search skips library items first-seen > excludeOlder ago — the
    # initial full backfill of the existing library is done via a one-shot manual
    # `cross-seed search --data-dirs ... --no-exclude-older` (mtime-independent).
    exclude_recent_search: "3 days"
    exclude_older: "2 weeks"           # 2w / 3d ≈ 4.7x (within 2-5x)
    skip_recheck: false        # recheck before seeding — avoids sending bad data to ratio trackers
    max_data_depth: 3
  qbit_manage:
    qbt_host: "http://qbittorrent.selfhost.svc.cluster.local:8080"
    tracker_tags:
      - keyword: "beyond-hd"
        tag: "beyond-hd"
      - keyword: "c411.org"
        tag: "c411"
      - keyword: "torr9.net"
        tag: "torr9"
    # Ratio (private) trackers: max_ratio -1 = never stop seeding → ratio keeps
    # climbing ; cleanup false = never auto-removed. min_seeding_time is a floor
    # (moot while cleanup:false). Public trackers (Torrent9, World-torrent) get no
    # group → qBit's no-limit default (seed until manually removed), ratio N/A.
    share_limits:
      - name: "group-beyond-hd"
        tracker_tag: "beyond-hd"
        max_ratio: -1
        max_seeding_time: -1
        min_seeding_time: 0
        cleanup: false
        priority: 1
      - name: "group-c411"
        tracker_tag: "c411"
        max_ratio: -1
        max_seeding_time: -1
        min_seeding_time: 0
        cleanup: false
        priority: 2
      - name: "group-torr9"
        tracker_tag: "torr9"
        max_ratio: -1
        max_seeding_time: -1
        min_seeding_time: 0
        cleanup: false
        priority: 3
    recyclebin_days: 30
    rem_orphaned: false
    # Auto-remove torrents the tracker reports as unregistered/dead (qbit_manage
    # matches specific msgs: "unregistered torrent", "not found", "trumped"…) →
    # kills the dead-grab loop without manual cleanup. NB: tracker "Forbidden" /
    # "no download permission" (account-gated) may NOT be classified unregistered,
    # so this is best-effort; share_limits cleanup:false keeps good seeds safe.
    rem_unregistered: true

sagas: []

categories:
  - name: series
    kind: series
    profile: general
    display: Séries
    base_path: /media/series
  - name: series-emilie
    kind: series
    profile: general
    display: Séries - Émilie
    base_path: /media/series-emilie
  - name: series-thomas
    kind: series
    profile: general
    display: Séries - Thomas
    base_path: /media/series-thomas
  - name: series-garcons
    kind: series
    profile: family
    display: Séries - Garçons
    base_path: /media/series-garcons
  - name: series-zoe
    kind: series
    profile: anime
    display: Séries - Zoé
    base_path: /media/series-zoe
  - name: films
    kind: movies
    profile: general
    display: Films
    base_path: /media/films
  - name: nouveaux-films
    kind: movies
    profile: general
    display: Nouveaux Films
    base_path: /media/nouveaux-films
  - name: films-enfants
    kind: movies
    profile: family
    display: Films - Enfants
    base_path: /media/films-enfants
  - name: films-animation-enfants
    kind: movies
    profile: family
    display: Films - Animation Enfants
    base_path: /media/films-animation-enfants
  - name: films-zoe
    kind: movies
    profile: anime
    display: Films - Zoé
    base_path: /media/films-zoe

# Maps each category's profile keyword → the configarr quality-profile NAME that
# `arrconf apply` assigns to that category's movies/series. arrconf resolves the
# name → id via read-only GET /qualityprofile (ADR-5 safe) and only re-profiles
# items currently on a non-managed (stock) profile.
category_quality_profiles:
  general: MULTi.VF
  anime: Anime
  family: Family

apps:
  sonarr:
    main:
      base_url: http://sonarr.selfhost.svc.cluster.local:8989
      tags:
        prune: false
      root_folders:
        prune: false
      download_clients:
        prune: false
      remote_path_mappings:
        prune: false
      series_tags:
        enable: true
        default_tag: tv

      # Phase 6 (D-06-RETAG-01): genre-keyword-driven post-import retagger.
      # Runs as step 10, AFTER series_tags (Phase 5 step 9 D-05-MIG-01 baseline tag).
      # Pitfall 5 (research): keyword lists are conservative.
      #   family: NEVER include "Animation" — catches anime
      #   anime:  ["Anime"] — TVDB has a first-class "Anime" genre
      content_routing:
        enable: true
        rules:
          - tag: family
            keywords: ["Family", "Kids", "Children"]
          - tag: anime
            keywords: ["Anime"]

  radarr:
    main:
      base_url: http://radarr.selfhost.svc.cluster.local:7878
      tags:
        prune: false
      root_folders:
        prune: false
      download_clients:
        prune: false
      remote_path_mappings:
        prune: false
      movie_tags:
        enable: true
        default_tag: movies

      # Phase 6 (D-06-RETAG-01): family-only on Radarr.
      # Pitfall 5: NO anime rule on Radarr.
      #   - TMDB has no "Anime" first-class genre
      #   - "Animation" would catch Pixar/Disney (false-positive)
      #   Anime films stay manual-tag until a future phase ships an
      #   originalLanguage-based filter (deferred — D-06+1).
      content_routing:
        enable: true
        rules:
          - tag: family
            keywords: ["Family"]

  prowlarr:
    main:
      base_url: http://prowlarr.selfhost.svc.cluster.local:9696
      apps:
        prune: false
        items:
          - name: Sonarr
            type: sonarr
            base_url: http://sonarr.selfhost.svc.cluster.local:8989
            api_key_env: SONARR_API_KEY
            sync_level: fullSync
          - name: Radarr
            type: radarr
            base_url: http://radarr.selfhost.svc.cluster.local:7878
            api_key_env: RADARR_API_KEY
            sync_level: fullSync

  qbittorrent:
    main:
      base_url: http://qbittorrent.selfhost.svc.cluster.local:8080
      categories:
        prune: false
      preferences:
        # D-05-QBT-02 opt-in reconcile. Enabled 2026-05-27 (quick 260527-jfk) to fix
        # the Phase 23 SC#3 finding: qBit autoTMM was off, so new Radarr/Sonarr grabs
        # landed in /data/complete instead of /data/torrents/<category>. With these on,
        # new torrents default to Automatic TMM and relocate to the category save_path.
        # Does NOT relocate existing manual torrents (only new ones).
        enable: true
        values:
          auto_tmm_enabled: true
          category_changed_tmm_enabled: true
          # temp_path off (2026-06-18): download straight into the category save_path,
          # no separate /data/incomplete dir. Kills qBit's completion-move step, which
          # only fires on the live completion event + is NOT retried on restart — a qBit
          # restart at the wrong moment stranded completed torrents in /data/incomplete
          # (no remote-path-mapping there → Sonarr/Radarr couldn't import). No move = no
          # stranding. Partial downloads live in the download area (NOT the Jellyfin
          # /media library); arr still imports only completed torrents.
          temp_path_enabled: false

  # Phase 6 (D-06-SCOPE-01): Seerr reconciler — single-instance per ADR-7.
  # 4 resources managed:
  #   1. settings/sonarr  — match by isDefault=true; writes animeTags + activeAnimeDirectory + activeAnimeProfileId + tagRequests=true
  #   2. settings/radarr  — match by isDefault=true; writes tags + tagRequests=true (NO animeTags equivalent on Radarr per Seerr schema)
  #   3. user[admin]      — single user; permissions=2 (ADMIN per research permissions bitmask)
  #   4. settings/main    — scoped subset (defaultPermissions + defaultQuotas only); uses POST not PUT (research Pitfall 2)
  # Integer ID magic numbers (recorded by Plan 06-01 in evidence/anime-profile-id-lookup.txt + snapshots/after-phase-5-2026-05-16/sonarr/tag.json):
  #   activeProfileId=6               = HD - 720p/1080p (current cluster default, confirmed by live GET)
  #   activeAnimeProfileId=8          = "Anime" profile (created by Phase 5 configarr, confirmed present)
  #   sonarr_service.tags=[2]         = 'tv' Sonarr tag id (after-phase-5 baseline)
  #   sonarr_service.animeTags=[3]    = 'anime' Sonarr tag id (after-phase-5 baseline)
  #   radarr_service.tags=[2]         = 'movies' Radarr tag id (after-phase-5 baseline)
  # apiKey fields are INTENTIONALLY ABSENT — preserved at reconcile-time from cluster GET (D-06-CREDS-01).
  seerr:
    main:
      base_url: http://seerr.selfhost.svc.cluster.local:5055
      sonarr_service:
        hostname: sonarr.selfhost.svc.cluster.local
        port: 8989
        useSsl: false
        activeProfileId: 6
        activeDirectory: /media/series
        activeAnimeProfileId: 8
        activeAnimeDirectory: /media/anime
        tags: [2]
        animeTags: [3]
        is4k: false
        isDefault: true
        enableSeasonFolders: false
        externalUrl: https://sonarr.tgu.ovh
        syncEnabled: true
        preventSearch: false
        tagRequests: true
      radarr_service:
        hostname: radarr.selfhost.svc.cluster.local
        port: 7878
        useSsl: false
        activeProfileId: 6
        activeDirectory: /media/films
        is4k: false
        minimumAvailability: released
        tags: [2]
        isDefault: true
        externalUrl: https://radarr.tgu.ovh
        syncEnabled: true
        preventSearch: false
        tagRequests: true
      users:
        enable: true
        prune: false
        admin:
          displayName: admin
          permissions: 2  # ADMIN per research permissions bitmask (NOT 8388608 — that is AUTO_REQUEST)
          movieQuotaDays: 0
          movieQuotaLimit: 0
          tvQuotaDays: 0
          tvQuotaLimit: 0
      main_settings:
        enable: true
        defaultPermissions: 32  # REQUEST per research permissions bitmask
        defaultQuotas:
          movie:
            quotaDays: 7
            quotaLimit: 5
          tv:
            quotaDays: 7
            quotaLimit: 5

  # Phase 7 (D-07-INSTANCE-01): Jellyfin reconciler — single-instance per ADR-7.
  # 4 resources managed (D-07-ORDER-01 ordering libraries → users → server_config → plugins):
  #   1. libraries      — POST /Library/VirtualFolders/Paths
  #                       (Pitfall 2: NOT idempotent; reconciler set-membership shim
  #                        skips paths already present in LibraryOptions.PathInfos)
  #                       D-07-LIB-01: merged 2 libraries multi-path (Séries + Films);
  #                       D-07-LIB-02: scope = Name + CollectionType + PathInfos only
  #                       (LibraryOptions/TypeOptions/fetchers stay operator-managed via UI).
  #   2. users.admin    — POST /Users/{id}/Policy
  #                       (Pitfall 4: POST not PUT — PUT returns 405)
  #                       (Pitfall 6 / D-06-OPENAPI-01 carry-forward: AuthenticationProviderId
  #                        and PasswordResetProviderId are OpenAPI-REQUIRED but operator-NEVER-configured;
  #                        reconciler re-injects from cluster GET — pattern mirror Seerr apiKey D-06-CREDS-01).
  #                       D-07-USERS-01: admin "moi" only (Id 82fd95db72904569b08d83271823ceaa);
  #                       emilie operator-managed via UI, prune=false hardcoded.
  #   3. server_config  — POST /System/Configuration
  #                       (Pitfall 1: full REPLACE — reconciler does GET → merge 7-field allowlist
  #                        into cluster 56-field dict → POST entire body)
  #                       (Pitfall 7: PluginRepositories diff is set-by-URL — operator UI reorder
  #                        does not cause false-positive update events)
  #                       D-07-CONFIG-01 allowlist: UICulture, MetadataCountryCode,
  #                       PreferredMetadataLanguage, ActivityLogRetentionDays,
  #                       LogFileRetentionDays, ServerName, PluginRepositories.
  #                       (TrickplayOptions, MetadataOptions[], CodecsUsed, etc. stay operator-managed.)
  #   4. plugins        — POST /Plugins/{id}/{version}/Enable
  #                       (Pitfall 5: VERSION required in path; /Plugins/{id}/Enable returns 405)
  #                       D-07-PLUGINS-01: activation-only (no install, no uninstall).
  #                       6 plugins allowlisted (TMDb, OMDb, MusicBrainz, AudioDb, Studio Images, Kodi Sync Queue).
  #
  # AuthenticationProviderId AND PasswordResetProviderId are INTENTIONALLY ABSENT below —
  # preserved at reconcile-time from cluster GET (Pitfall 6 / D-06-OPENAPI-01 carry-forward).
  #
  # ADR-8 (forceSave) does NOT apply to Jellyfin (spec.md §895): the JellyfinClient
  # does NOT inherit from _ArrV3Client — Jellyfin has no forceSave mechanism.
  jellyfin:
    main:
      base_url: http://jellyfin.selfhost.svc.cluster.local:8096
      libraries:
        enable: true
        prune: false  # Phase 16 SC#3 — post-cutover lock. SC#2 prune cleanup already executed live (12 paths removed from legacy Séries+Films). D-16-PRUNE-01 opt-in (reverses D-07-LIB-01) — re-enable manually if operator-added libs drift.
        enable_chapter_image_extraction: true  # D-06 (JFSKIP-04): uniform on all 10 Category libs
      users:
        enable: true
        prune: false  # D-07-USERS-01 hardcoded — emilie operator-managed, never touched
        admin:
          IsAdministrator: true
          EnableContentDeletion: true
          EnableRemoteAccess: true
          EnableLiveTvAccess: true
          EnableLiveTvManagement: false
          EnableMediaPlayback: true
          EnableAudioPlaybackTranscoding: true
          EnableVideoPlaybackTranscoding: true
          EnablePlaybackRemuxing: true
          EnableContentDownloading: true
          EnableSyncTranscoding: true
          EnableMediaConversion: true
          EnableAllDevices: true
          EnableAllChannels: true
          EnableAllFolders: true
          InvalidLoginAttemptCount: 0
          LoginAttemptsBeforeLockout: -1
          MaxActiveSessions: 0
          EnablePublicSharing: false
          EnableUserPreferenceAccess: true
          EnableRemoteControlOfOtherUsers: false
          EnableSharedDeviceControl: true
          EnablePlaylistManagement: true
          EnableCollectionManagement: false
          EnableSubtitleManagement: false
          SyncPlayAccess: "CreateAndJoinGroups"
          RemoteClientBitrateLimit: 0
      server_config:
        enable: true
        ui_culture: "fr"
        metadata_country_code: "FR"
        preferred_metadata_language: "fr"
        activity_log_retention_days: 30
        log_file_retention_days: 3
        server_name: "jellyfin"
        plugin_repositories:
          - Name: "Jellyfin Stable"
            Url: "https://repo.jellyfin.org/files/plugin/manifest.json"
            Enabled: true
          # D-03 (JFSKIP-01): Intro Skipper manifest — idempotent set-by-URL via _server_config_equivalent()
          - Name: "Intro Skipper"
            Url: "https://intro-skipper.org/manifest.json"
            Enabled: true
      plugins:
        enable: true
        required:
          - name: "TMDb"
          - name: "OMDb"
          - name: "MusicBrainz"
          - name: "AudioDB"
          - name: "Studio Images"
          - name: "Kodi Sync Queue"
          # D-01/D-02/D-04/D-05 (JFSKIP-02/03): Intro Skipper install (two-run) + intro+credits config
          - name: "Intro Skipper"
            install_guid: "c83d86bb-a1e0-4c35-a113-e2101cf4ee6b"
            install_version: "1.10.11.19"
            install_repo_url: "https://intro-skipper.org/manifest.json"
            config:
              AutoSkip: false          # show skip button only; auto-skip is Out of Scope (PROJECT.md)
              AutoSkipCredits: false
              MaxParallelism: 1        # D-05: off-peak concurrency cap for single-node MicroK8s
          # Phase 29 (SAGAS-03): TMDb Box Sets install (two-run, ADR-9). Auto-groups movies
          # sharing a TMDB collection into Jellyfin BoxSets via its scheduled task — no per-saga
          # config needed. Repo URL matches the "Jellyfin Stable" repo manifest entry above.
          - name: "TMDb Box Sets"
            install_guid: "bc4aad2e-d3d0-4725-a5e2-fd07949e5b42"
            install_version: "13.0.0.0"
            install_repo_url: "https://repo.jellyfin.org/files/plugin/manifest.json"

# ============================================================================
# Profile definitions — quality profiles for configarr.yml generation (Phase 33)
# ----------------------------------------------------------------------------
# Keyed by configarr profile names (MULTi.VF / Anime / Family).
# categories[].profile values stay as general/anime/family (D-33-04 Option B);
# the generator maps them to configarr names at emit time.
#
# body: QP fields emitted verbatim into configarr quality_profiles.
# custom_formats: CF refs + per-profile scores (VOSTFR differs per profile:
#   MULTi.VF=-10000, Anime=+50, Family=-10000 per D-05-CONFIGARR-01 / Q5).
# ============================================================================
profile_definitions:
  MULTi.VF:
    body:
      language: Any
      reset_unmatched_scores:
        enabled: true
      upgrade:
        allowed: false   # policy: once downloaded, never grab a new version (no quality/score upgrade hunt → no dead-release re-grab loops on FR trackers)
        until_quality: WEB 1080p
        until_score: 2000
        min_format_score: 50
      min_format_score: 0
      quality_sort: top
      qualities:
        - name: Bluray-1080p
        - name: WEB 1080p
          qualities:
            - WEBDL-1080p
            - WEBRip-1080p
        - name: HDTV-1080p
        - name: Bluray-720p
        - name: WEB 720p
          qualities:
            - WEBDL-720p
            - WEBRip-720p
        - name: HDTV-720p
    custom_formats:
      - trash_ids: [fr-vff, fr-vfi, fr-vfq, fr-multi]
      - trash_ids: [fr-vostfr]
        score: -10000
      - trash_ids: [fr-mhd, fr-x265-hd]

  Anime:
    body:
      # D-05-CONFIGARR-02: Anime profile — HD scope same as MULTi.VF.
      # VOSTFR is allowed (+50) for anime (fansubs are common + quality).
      language: Any
      reset_unmatched_scores:
        enabled: true
      upgrade:
        allowed: false   # policy: once downloaded, never grab a new version (no quality/score upgrade hunt → no dead-release re-grab loops on FR trackers)
        until_quality: WEB 1080p
        until_score: 2000
        min_format_score: 50
      min_format_score: 0
      quality_sort: top
      qualities:
        - name: Bluray-1080p
        - name: WEB 1080p
          qualities:
            - WEBDL-1080p
            - WEBRip-1080p
        - name: HDTV-1080p
        - name: Bluray-720p
        - name: WEB 720p
          qualities:
            - WEBDL-720p
            - WEBRip-720p
        - name: HDTV-720p
    custom_formats:
      - trash_ids: [fr-vff, fr-vfi, fr-vfq, fr-multi]
      - trash_ids: [fr-vostfr]
        score: 50
      - trash_ids: [fr-mhd, fr-x265-hd]

  Family:
    body:
      # D-05-FAM-01: byte-equivalent clone of MULTi.VF (D-33-03 independent definition).
      # Differentiation is path/tag-only, not quality semantics.
      language: Any
      reset_unmatched_scores:
        enabled: true
      upgrade:
        allowed: false   # policy: once downloaded, never grab a new version (no quality/score upgrade hunt → no dead-release re-grab loops on FR trackers)
        until_quality: WEB 1080p
        until_score: 2000
        min_format_score: 50
      min_format_score: 0
      quality_sort: top
      qualities:
        - name: Bluray-1080p
        - name: WEB 1080p
          qualities:
            - WEBDL-1080p
            - WEBRip-1080p
        - name: HDTV-1080p
        - name: Bluray-720p
        - name: WEB 720p
          qualities:
            - WEBDL-720p
            - WEBRip-720p
        - name: HDTV-720p
    custom_formats:
      - trash_ids: [fr-vff, fr-vfi, fr-vfq, fr-multi]
      - trash_ids: [fr-vostfr]
        score: -10000
      - trash_ids: [fr-mhd, fr-x265-hd]

# ============================================================================
# Configarr pass-through skeleton — content emitted verbatim into configarr.yml
# ----------------------------------------------------------------------------
# Everything that is NOT quality_profiles / custom_formats (those are GENERATED
# from profile_definitions + categories above).
# D-33-07/08: api_key stored as quoted string "!env VAR" (safe-loader compatible);
# the generator reconstructs bare !env tags at emit time (CFGARR-03 / T-33-01).
# ============================================================================
configarr:
  trashGuideUrl: https://github.com/TRaSH-Guides/Guides
  recyclarrConfigUrl: https://github.com/recyclarr/config-templates

  customFormatDefinitions:
    # ---------------------------------------------------------------------------
    # Pistes françaises (préférées) — score positif.
    # ---------------------------------------------------------------------------
    - trash_id: fr-vff
      trash_scores:
        default: 150
      name: "FR: VFF / TRUEFRENCH"
      includeCustomFormatWhenRenaming: false
      specifications:
        - name: VFF or TRUEFRENCH in release title
          implementation: ReleaseTitleSpecification
          negate: false
          required: false
          fields:
            value: "\\b(VFF|TRUEFRENCH)\\b"

    - trash_id: fr-vfi
      trash_scores:
        default: 150
      name: "FR: VFI"
      includeCustomFormatWhenRenaming: false
      specifications:
        - name: VFI in release title
          implementation: ReleaseTitleSpecification
          negate: false
          required: false
          fields:
            value: "\\bVFI\\b"

    - trash_id: fr-vfq
      trash_scores:
        default: 150
      name: "FR: VFQ"
      includeCustomFormatWhenRenaming: false
      specifications:
        - name: VFQ in release title
          implementation: ReleaseTitleSpecification
          negate: false
          required: false
          fields:
            value: "\\bVFQ\\b"

    - trash_id: fr-multi
      trash_scores:
        default: 100
      name: "FR: MULTi"
      includeCustomFormatWhenRenaming: false
      specifications:
        - name: MULTi in release title
          implementation: ReleaseTitleSpecification
          negate: false
          required: false
          fields:
            value: "\\bMULTI?\\b"

    # ---------------------------------------------------------------------------
    # Sous-titres uniquement (à interdire) — score rédhibitoire.
    # ---------------------------------------------------------------------------
    - trash_id: fr-vostfr
      trash_scores:
        default: -10000
      name: "FR: VOSTFR (subs only)"
      includeCustomFormatWhenRenaming: false
      specifications:
        - name: VOSTFR in release title
          implementation: ReleaseTitleSpecification
          negate: false
          required: false
          fields:
            value: "\\bVOSTFR\\b"

    # ---------------------------------------------------------------------------
    # mHD / MHD — encodes HD efficaces, fichiers les plus petits (priorité).
    # ---------------------------------------------------------------------------
    - trash_id: fr-mhd
      trash_scores:
        default: 1000
      name: "mHD / MHD (small encode)"
      includeCustomFormatWhenRenaming: false
      specifications:
        - name: mHD or MHD in release title
          implementation: ReleaseTitleSpecification
          negate: false
          required: false
          fields:
            value: "\\b(mHD|MHD)\\b"

    # ---------------------------------------------------------------------------
    # x265 / HEVC en HD (720p / 1080p) — bonus codec efficace.
    # ---------------------------------------------------------------------------
    - trash_id: fr-x265-hd
      trash_scores:
        default: 500
      name: "x265 / HEVC (HD)"
      includeCustomFormatWhenRenaming: false
      specifications:
        - name: x265 / HEVC codec
          implementation: ReleaseTitleSpecification
          negate: false
          required: true
          fields:
            value: "\\b(x265|h\\.?265|hevc)\\b"
        - name: Not 2160p
          implementation: ResolutionSpecification
          negate: true
          required: true
          fields:
            value: 2160

